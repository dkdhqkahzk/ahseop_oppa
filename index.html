<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>야구부 선배와의 로맨스</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div id="game-container">
        <div id="background"></div>
        <div id="character-container">
            <img id="character-img" src="" alt="캐릭터">
        </div>
        <div id="ui-container">
            <div id="name-box">이름</div>
            <div id="dialogue-box">내용이 여기에 표시됩니다.</div>
            <div id="choice-container">
                </div>
        </div>
    </div>
    <button id="menu-btn" onclick="openMenu()" style="z-index: 9999;">Menu</button>
    <div id="menu-modal" class="hidden">
        <div class="menu-content">
            <h3>게임 설정</h3>
            <button onclick="saveGame()">현재 위치 저장하기</button>
            <button onclick="loadGame()">저장된 곳에서 시작</button>
            <button onclick="resetGame()">처음부터 시작</button>
            <button id="close-menu" onclick="closeMenu()">닫기</button>
        </div>
    </div>
    <div id="status-bar">
    <span id="love-status">선배와의 호감도: 0 ❤️</span>
    </div>
    <script src="script.js"></script>
</body>
</html>
